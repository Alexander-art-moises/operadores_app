/* ═══════════════════════════════════════════════════════════════
   FUNCIONES DE APOYO — NO TOCAR
   Estas funciones convierten links de Drive y calculan tiempos.
═══════════════════════════════════════════════════════════════ */

/* Convierte link de Drive en imagen visible */
function driveDirecto(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
  return url;
}

/* Convierte link de Drive en preview de PDF */
function drivePreview(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/file/d/${match[1]}/preview`;
  return url;
}

/* Calcula tiempo transcurrido desde una fecha hasta hoy */
function tiempoDesde(f) {
  const [d,m,y] = f.split("/").map(Number);
  const desde = new Date(y, m-1, d);
  const hoy = new Date();
  let a = hoy.getFullYear() - desde.getFullYear();
  let ms = hoy.getMonth() - desde.getMonth();
  if (ms < 0) { a--; ms += 12; }
  if (a > 0 && ms > 0) return `${a} año${a>1?"s":""} ${ms} mes${ms>1?"es":""}`;
  if (a > 0) return `${a} año${a>1?"s":""}`;
  return `${ms} mes${ms>1?"es":""}`;
}

    <!-- Mensaje de error, oculto por defecto -->
    <p class="pin-error" id="pin-error">PIN incorrecto. Intenta nuevamente.</p>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════
     PANTALLA 2 — PERFIL DEL OPERADOR
     Oculta por defecto, se muestra cuando el PIN es correcto
═══════════════════════════════════════════════════════════════ -->
<div id="pantalla-perfil">

  <!-- ENCABEZADO AZUL: foto + nombre + cargo + ID -->
  <div class="header-band">

    <!-- Aquí JavaScript inserta la foto del operador -->
    <div id="avatar-container"></div>

    <!-- Datos del operador (los llena JavaScript) -->
    <div class="header-info">
      <h1 id="op-nombre"></h1>
      <p  id="op-cargo"></p>
      <p  class="header-id" id="op-id"></p>
    </div>

    <!-- → CAMBIO 15: Logo de Volcán (descomenta y pon tu link)
    <img src="https://drive.google.com/thumbnail?id=ID_DEL_LOGO&sz=w200"
         style="height:38px; margin-left:auto; opacity:0.9;">
    -->

  </div>

  <!-- GRILLA DE INFORMACIÓN -->
  <div class="info-grid">
    <div class="info-box">
      <label>Área</label>
      <span id="op-area"></span>
    </div>
    <div class="info-box">
      <label>Años en empresa</label>
      <span id="op-antiguedad"></span>
    </div>
    <div class="info-box" style="grid-column:1/-1"> <!-- ocupa las 2 columnas -->
      <label>Tiempo en el puesto</label>
      <span id="op-puesto"></span>
    </div>
  </div>

  <!-- RIESGOS CRÍTICOS -->
  <div class="seccion">
    <!-- → CAMBIO 16: Texto del título de riesgos -->
    <div class="seccion-titulo">⚠ Riesgos críticos del área</div>
    <!-- JavaScript inserta los tags de riesgos aquí -->
    <div class="riesgos-wrap" id="op-riesgos"></div>
  </div>

  <!-- PESTAÑAS DE DOCUMENTOS -->
  <div class="tabs">
    <!-- → CAMBIO 17: Nombres de las pestañas -->
    <div class="tab activa" onclick="cambiarTab(0)">Capacitaciones</div>
    <div class="tab"        onclick="cambiarTab(1)">Certificaciones</div>
    <div class="tab"        onclick="cambiarTab(2)">Médico / EPP</div>
  </div>

  <!-- Contenido de cada pestaña (JavaScript los llena) -->
  <div class="tab-content activa" id="tab-capacitaciones"></div>
  <div class="tab-content"        id="tab-certificaciones"></div>
  <div class="tab-content"        id="tab-medico"></div>

  <!-- → CAMBIO 18: Texto del botón cerrar sesión -->
  <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>

</div>


<!-- ═══════════════════════════════════════════════════════════════
     VISOR DE PDF (ventana emergente al hacer click en Ver PDF)
═══════════════════════════════════════════════════════════════ -->
<div id="visor-pdf">
  <div class="visor-header">
    <span id="visor-titulo">Documento</span>
    <button class="btn-cerrar" onclick="cerrarPDF()">✕ Cerrar</button>
  </div>
  <!-- El PDF se carga aquí dentro -->
  <iframe id="iframe-pdf" allowfullscreen></iframe>
</div>


<!-- ═══════════════════════════════════════════════════════════════
     LÓGICA JAVASCRIPT — NO TOCAR
     Estas funciones controlan el comportamiento de la página
═══════════════════════════════════════════════════════════════ -->
<script>

  /* Lee el ID del operador de la URL (?id=OP-00100) */
  const params = new URLSearchParams(window.location.search);
  const idURL  = params.get("id");

  let rolActual = null;
  let idActual  = null;

  /* Se ejecuta cuando el usuario hace click en "Ingresar" o presiona Enter */
  function verificarPin() {
    const pin       = document.getElementById("input-pin").value.trim();
    const encontrado = PINES[pin];                    /* Busca el PIN en la lista */
    const error     = document.getElementById("pin-error");

    /* Si el PIN no existe → muestra error */
    if (!encontrado) {
      error.textContent = "PIN incorrecto. Intenta nuevamente.";
      error.style.display = "block";
      document.getElementById("input-pin").value = "";
      return;
    }

    error.style.display = "none";
    rolActual = encontrado.rol;

    /* Si es operador → solo puede ver su propio perfil */
    if (encontrado.rol === "operador") {
      if (!idURL || encontrado.id !== idURL) {
        error.textContent = "No tienes permiso para ver este perfil.";
        error.style.display = "block";
        document.getElementById("input-pin").value = "";
        return;
      }
      idActual = encontrado.id;
    } else {
      /* Si es supervisor o maestro → ve al operador del QR */
      if (!idURL) {
        error.textContent = "QR inválido. No se encontró el operador.";
        error.style.display = "block";
        return;
      }
      idActual = idURL;
    }

    mostrarPerfil(idActual);
  }

  /* Llena la pantalla con los datos del operador */
  function mostrarPerfil(id) {
    const op = OPERADORES.find(o => o.id === id);    /* Busca el operador por ID */

    if (!op) {
      document.getElementById("pin-error").textContent = "Operador no encontrado.";
      document.getElementById("pin-error").style.display = "block";
      return;
    }

    /* Crea las iniciales para el fallback si la foto no carga */
    const partes   = op.nombre.split(" ");
    const iniciales = (partes[1]?.[0] || "") + (partes[0]?.[0] || "");

    /* Inserta la foto del operador */
    const avatarContainer = document.getElementById("avatar-container");
    const img = document.createElement("img");
    img.className = "avatar";
    img.src       = driveDirecto(op.foto);
    img.alt       = op.nombre;
    img.onerror   = function() {
      avatarContainer.innerHTML = `<div class="avatar-fallback">${iniciales.toUpperCase()}</div>`;
    };
    avatarContainer.appendChild(img);

    /* Rellena los campos de texto */
    document.getElementById("op-nombre").textContent    = op.nombre;
    document.getElementById("op-cargo").textContent     = op.cargo;
    document.getElementById("op-id").textContent        = op.id;
    document.getElementById("op-area").textContent      = op.area;
    document.getElementById("op-antiguedad").textContent = tiempoDesde(op.fechaIngresoEmpresa);
    document.getElementById("op-puesto").textContent    = tiempoDesde(op.fechaIngresoPuesto);

    /* Crea los tags de riesgos */
    const riesgosEl = document.getElementById("op-riesgos");
    op.riesgos.forEach(r => {
      const tag = document.createElement("span");
      tag.className   = "riesgo-tag";
      tag.textContent = r;
      riesgosEl.appendChild(tag);
    });

    /* Separa documentos por tipo y llena cada pestaña */
    renderDocs("tab-capacitaciones",  op.documentos.filter(d => d.tipo === "Capacitación"));
    renderDocs("tab-certificaciones", op.documentos.filter(d => d.tipo === "Certificación"));
    renderDocs("tab-medico",          op.medico_epp);

    /* Oculta el PIN y muestra el perfil */
    document.getElementById("pantalla-pin").style.display    = "none";
    document.getElementById("pantalla-perfil").style.display = "block";
  }

  /* Crea las tarjetas de documentos dentro de cada pestaña */
  function renderDocs(contenedorId, docs) {
    const el = document.getElementById(contenedorId);

    if (!docs || docs.length === 0) {
      el.innerHTML = '<p class="sin-datos">Sin documentos registrados</p>';
      return;
    }

    docs.forEach(doc => {
      /* Convierte "POR VENCER" → "POR-VENCER" para que coincida con la clase CSS */
      const badgeClass = "badge-" + doc.estado.replace(/ /g, "-");

      const div = document.createElement("div");
      div.className = "doc-item";
      div.innerHTML = `
        <div class="doc-info">
          <div class="doc-tipo">${doc.tipo || ""}</div>
          <div class="doc-nombre">${doc.nombre}</div>
          <div class="doc-fecha">Vence: ${doc.vencimiento}</div>
        </div>
        <div class="doc-derecha">
          <span class="badge ${badgeClass}">${doc.estado}</span>
          ${doc.pdf
            ? `<button class="btn-pdf" onclick="abrirPDF('${drivePreview(doc.pdf)}','${doc.nombre}')">Ver PDF</button>`
            : ""}
        </div>
      `;
      el.appendChild(div);
    });
  }

  /* Cambia la pestaña activa */
  function cambiarTab(idx) {
    document.querySelectorAll(".tab").forEach((t,i)         => t.classList.toggle("activa", i === idx));
    document.querySelectorAll(".tab-content").forEach((c,i) => c.classList.toggle("activa", i === idx));
  }

  /* Abre el visor de PDF */
  function abrirPDF(url, titulo) {
    document.getElementById("visor-titulo").textContent = titulo;
    document.getElementById("iframe-pdf").src           = url;
    document.getElementById("visor-pdf").style.display  = "flex";
  }

  /* Cierra el visor de PDF */
  function cerrarPDF() {
    document.getElementById("visor-pdf").style.display = "none";
    document.getElementById("iframe-pdf").src          = "";
  }

  /* Cierra sesión recargando la página */
  function cerrarSesion() {
    location.reload();
  }

</script>
</body>
</html>
