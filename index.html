const PINES = {

function driveDirecto(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
  return url;
}
function drivePreview(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/file/d/${match[1]}/preview?rm=minimal&embedded=true&chrome=false`;
  return url;
}
function tiempoDesde(f) {
  const [d,m,y] = f.split("/").map(Number);
  const desde = new Date(y, m-1, d);
  const hoy = new Date();
  let a = hoy.getFullYear() - desde.getFullYear();
  let ms = hoy.getMonth() - desde.getMonth();
  if (ms < 0) { a--; ms += 12; }
  if (a > 0 && ms > 0) return `${a} año${a>1?"s":""} ${ms} mes${ms>1?"es":""}`;
  if (a > 0) return `${a} año${a>1?"s":""}`;
  return `${ms} mes${ms>1?"es":""}`;
}

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #202b3d;
  min-height: 100vh;
}

/* ══════════════════════════════
   PANTALLA DE PIN
══════════════════════════════ */
#pantalla-pin {
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 25%;
  background-image: url('https://raw.githubusercontent.com/Alexander-art-moises/operadores_app/main/FONDO%20DE%20FONDOS.png');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
}

.pin-card {
  width: 80%;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.pin-input {
  width: 100%;
  padding: 5px;
  font-size: 28px;
  text-align: center;
  letter-spacing: 12px;
  border: 2px solid #ff8a00;
  border-radius: 14px;
  outline: none;
  color: #ff8a00;
  background: rgba(255, 255, 255, 0.88);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 12px rgba(31,78,121,0.10);
}
.pin-input:focus {
  border-color: #ff8a00;
  background: rgba(255,255,255,0.97);
}
.pin-input::placeholder {
  color: #ff8a00;
  opacity: 1;
}

.btn-entrar {
  width: 100%;
  padding: 15px;
  background: #1F4E79;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 14px rgba(31,78,121,0.25);
}
.btn-entrar:hover { background: #2E75B6; }
.btn-entrar:active { transform: scale(0.98); }

.pin-error {
  color: #fff;
  background: rgba(192,0,0,0.80);
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
  width: 100%;
}
.pin-frase {
  color: white;
  font-size: 20px;
  font-style: italic;
  font-weight: bold;
  text-align: center;
  line-height: 1.6;
  margin-top: 16px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

/* ══════════════════════════════
   PANTALLA DE PERFIL
══════════════════════════════ */
#pantalla-perfil { display: none; max-width: 420px; margin: 0 auto; padding-bottom: 32px; }

.header-band {
  background: #1f3055;
  padding: 20px 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff7300;
  background: #264984;
  flex-shrink: 0;
}
.avatar-fallback {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: #264984;
  border: 3px solid #ff7300;

  font-size: 22px; font-weight: bold; color: white;
  flex-shrink: 0;
}

.header-info h1      { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 3px; }
.header-slogan       { font-size: 13px; color: #ff7300; margin-bottom: 2px; }
.header-dni          { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; }

  border: 1px solid #c5d3ea;
}
.info-box label { font-size: 11px; color: #888; display: block; margin-bottom: 2px; }
.info-box span  { font-size: 13px; font-weight: bold; color: #1f3055; }

.seccion { padding: 0 14px 6px; }
.seccion-titulo {
  font-size: 11px; font-weight: bold; color: #ff7300;
  text-transform: uppercase; letter-spacing: 0.05em;

}

.riesgos-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  background: #fff8f0;
  color: #cc5e00;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1.5px solid #ff7300;
  font-weight: bold;
}

.tabs {
  display: flex;
  background: white;
  border-bottom: 2px solid #c5d3ea;
  margin: 14px 0 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 11px 4px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-weight: bold;
}
.tab.activa {
  color: #1f3055;
  border-bottom-color: #ff7300;
}
.tab-content { display: none; padding: 4px 14px 8px; }
.tab-content.activa { display: block; }

.doc-item {
  background: white;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.doc-info    { flex: 1; min-width: 0; }
.doc-tipo    { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; }
.doc-nombre  { font-size: 13px; font-weight: bold; color: #1f3055; margin-bottom: 3px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.doc-derecha { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

.badge { font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.badge-VIGENTE    { background: #E2EFDA; color: #375623; border: 1px solid #A9D18E; }
.badge-POR-VENCER { background: #FFF2CC; color: #7F5B00; border: 1px solid #FFD966; }
.badge-VENCIDO    { background: #FCE4D6; color: #833C00; border: 1px solid #F4B183; }

.btn-pdf {
  font-size: 11px;
  color: #1f3055;
  background: #e8eef8;
  border: 1px solid #c5d3ea;

}
.btn-pdf:hover { background: #c5d3ea; }

#visor-pdf {
  display: none;
  position: fixed;

}
.visor-header {
  background: #1f3055;

}
.visor-header span { color: white; font-size: 14px; font-weight: bold; }
.btn-cerrar {
  background: rgba(255,255,255,0.2);
  color: white; border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: bold;
}
#iframe-pdf { flex: 1; border: none; width: 100%; }

.btn-salir {
  display: block; width: 100%; margin: 0; padding: 13px;
  background: white; color: #888; border: none;
  border-top: 1px solid #ddd;
  border-radius: 0; font-size: 13px; text-align: center;
  cursor: pointer; font-weight: bold;
}
.btn-salir:hover { background: #f5f5f5; }
.sin-datos { text-align: center; color: #aaa; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<!-- PANTALLA 1 — PIN -->
<div id="pantalla-pin">
  <div class="pin-card">
    <input
      class="pin-input"
      type="password"
      id="input-pin"
      maxlength="6"
      placeholder="••••"
      inputmode="numeric"
      pattern="[0-9]*"
      onkeydown="if(event.key==='Enter') verificarPin()"
    >
   <button class="btn-entrar" onclick="verificarPin()">INGRESAR</button>
<p class="pin-error" id="pin-error">PIN incorrecto. Intenta nuevamente.</p>
<p class="pin-frase">Cada tarea, cada turno,<br>cada decisión importa.<br>Tú eres lo más valioso de<br>esta operación.</p>
  </div>
</div>


<!-- PANTALLA 2 — PERFIL -->
<div id="pantalla-perfil">

  <div class="header-band">
    <div id="avatar-container"></div>
    <div class="header-info">
      <h1 id="op-nombre"></h1>
      <p class="header-slogan">Tu seguridad vale más que el doré</p>
      <p class="header-dni" id="op-dni"></p>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-box">
      <label>Área</label>
      <span id="op-area"></span>
    </div>
    <div class="info-box">
      <label>Años en empresa</label>
      <span id="op-antiguedad"></span>
    </div>
    <div class="info-box" style="grid-column:1/-1">
      <label>Puesto</label>
      <span id="op-puesto"></span>
    </div>
  </div>

  <div class="seccion">
    <div class="seccion-titulo">Riesgos críticos del área</div>
    <div class="riesgos-wrap" id="op-riesgos"></div>
  </div>

  <div class="tabs">
    <div class="tab activa" onclick="cambiarTab(0)">Capacitaciones</div>
    <div class="tab"        onclick="cambiarTab(1)">Certificaciones</div>
    <div class="tab"        onclick="cambiarTab(2)">Exam. Médico</div>
  </div>

  <div class="tab-content activa" id="tab-capacitaciones"></div>
  <div class="tab-content"        id="tab-certificaciones"></div>
  <div class="tab-content"        id="tab-medico"></div>

  <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>

</div>


<!-- VISOR PDF -->
<div id="visor-pdf">
  <div class="visor-header">
    <span id="visor-titulo">Documento</span>
    <button class="btn-cerrar" onclick="cerrarPDF()">✕ Cerrar</button>
  </div>
  <iframe id="iframe-pdf" allowfullscreen></iframe>
</div>


<script>
  const params  = new URLSearchParams(window.location.search);
  const idURL   = params.get("id");
  let rolActual = null;
  let idActual  = null;

  function verificarPin() {
    const pin        = document.getElementById("input-pin").value.trim();
    const encontrado = PINES[pin];
    const error      = document.getElementById("pin-error");

    if (!encontrado) {
      error.textContent   = "PIN incorrecto. Intenta nuevamente.";
      error.style.display = "block";
      document.getElementById("input-pin").value = "";
      return;
    }

    error.style.display = "none";
    rolActual = encontrado.rol;

    if (encontrado.rol === "operador") {
      if (!idURL || encontrado.id !== idURL) {
        error.textContent   = "No tienes permiso para ver este perfil.";
        error.style.display = "block";
        document.getElementById("input-pin").value = "";
        return;
      }
      idActual = encontrado.id;
    } else {
      if (!idURL) {
        error.textContent   = "QR inválido. No se encontró el operador.";
        error.style.display = "block";
        return;
      }
      idActual = idURL;
    }

    mostrarPerfil(idActual);
  }

  function mostrarPerfil(id) {
    const op = OPERADORES.find(o => o.id === id);
    if (!op) {
      document.getElementById("pin-error").textContent   = "Operador no encontrado.";
      document.getElementById("pin-error").style.display = "block";
      return;
    }

    const partes    = op.nombre.split(" ");
    const iniciales = (partes[1]?.[0] || "") + (partes[0]?.[0] || "");

    const avatarContainer = document.getElementById("avatar-container");
    const img = document.createElement("img");
    img.className = "avatar";
    img.src       = driveDirecto(op.foto);
    img.alt       = op.nombre;
    img.onerror   = function() {
      avatarContainer.innerHTML = `<div class="avatar-fallback">${iniciales.toUpperCase()}</div>`;
    };
    avatarContainer.appendChild(img);

    document.getElementById("op-nombre").textContent     = op.nombre;
    document.getElementById("op-dni").textContent        = "DNI: " + op.dni;
    document.getElementById("op-area").textContent       = op.area;
    document.getElementById("op-antiguedad").textContent = tiempoDesde(op.fechaIngresoEmpresa);
    document.getElementById("op-puesto").textContent     = op.cargo;

    const riesgosEl = document.getElementById("op-riesgos");
    op.riesgos.forEach(r => {
      const tag = document.createElement("span");
      tag.className   = "riesgo-tag";
      tag.textContent = r;
      riesgosEl.appendChild(tag);
    });

    renderDocs("tab-capacitaciones",  op.documentos.filter(d => d.tipo === "Capacitación"));
    renderDocs("tab-certificaciones", op.documentos.filter(d => d.tipo === "Certificación"));
    renderDocs("tab-medico",          op.medico_epp);

    document.getElementById("pantalla-pin").style.display    = "none";
    document.getElementById("pantalla-perfil").style.display = "block";
  }

  function renderDocs(contenedorId, docs) {
    const el = document.getElementById(contenedorId);
    if (!docs || docs.length === 0) {
      el.innerHTML = '<p class="sin-datos">Sin documentos registrados</p>';
      return;
    }
    docs.forEach(doc => {
      const badgeClass = "badge-" + doc.estado.replace(/ /g, "-");
      const div = document.createElement("div");
      div.className = "doc-item";
      div.innerHTML = `
        <div class="doc-info">
          <div class="doc-tipo">${doc.tipo || ""}</div>
          <div class="doc-nombre">${doc.nombre}</div>
          <div class="doc-fecha">Vence: ${doc.vencimiento}</div>
        </div>
        <div class="doc-derecha">
          <span class="badge ${badgeClass}">${doc.estado}</span>
          ${doc.pdf ? `<button class="btn-pdf" onclick="abrirPDF('${drivePreview(doc.pdf)}','${doc.nombre}')">Ver PDF</button>` : ""}
        </div>
      `;
      el.appendChild(div);
    });
  }

  function cambiarTab(idx) {
    document.querySelectorAll(".tab").forEach((t,i)         => t.classList.toggle("activa", i === idx));
    document.querySelectorAll(".tab-content").forEach((c,i) => c.classList.toggle("activa", i === idx));
  }

function abrirPDF(url, titulo) {
    document.getElementById("visor-titulo").textContent = titulo;
    document.getElementById("iframe-pdf").src           = url;
    document.getElementById("visor-pdf").style.display  = "flex";
  }

  function cerrarPDF() {
    document.getElementById("visor-pdf").style.display = "none";
    document.getElementById("iframe-pdf").src          = "";
  }

  function cerrarSesion() {
    location.reload();
  }
</script>
</body>
</html>
