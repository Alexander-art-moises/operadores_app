
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volcán · Planta Óxidos</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #202b3d;
  min-height: 100vh;
}

#pantalla-carga {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1f3055;
  gap: 20px;
}
.spinner {
  width: 48px; height: 48px;
  border: 5px solid rgba(255,255,255,0.2);
  border-top-color: #ff7300;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.carga-texto { color: rgba(255,255,255,0.7); font-size: 14px; }

#pantalla-pin {
  min-height: 100vh;
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 20%;
  background-image: url('https://raw.githubusercontent.com/Alexander-art-moises/operadores_app/main/FONDO%20DE%20FONDOS.png');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
}

.pin-card {
  width: 80%;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.pin-input {
  width: 100%;
  padding: 5px;
  font-size: 28px;
  text-align: center;
  letter-spacing: 12px;
  border: 2px solid #ff8a00;
  border-radius: 14px;
  outline: none;
  color: #ff8a00;
  background: rgba(255, 255, 255, 0.88);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 12px rgba(31,78,121,0.10);
}
.pin-input:focus { border-color: #ff8a00; background: rgba(255,255,255,0.97); }
.pin-input::placeholder { color: #ff8a00; opacity: 1; }

.btn-entrar {
  width: 100%;
  padding: 15px;
  background: #1F4E79;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 14px rgba(31,78,121,0.25);
}
.btn-entrar:hover { background: #2E75B6; }
.btn-entrar:active { transform: scale(0.98); }

.pin-error {
  color: #fff;
  background: rgba(192,0,0,0.80);
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
  width: 100%;
}
.pin-frase {
  color: white;
  font-size: 20px;
  font-style: italic;
  font-weight: bold;
  text-align: center;
  line-height: 1.6;
  margin-top: 6px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

/* ══════════════════════════════
   PANTALLA LISTA COLABORADORES
══════════════════════════════ */
#pantalla-lista {
  display: none;
  max-width: 420px;
  margin: 0 auto;
  padding-bottom: 32px;
}
.lista-header {
  background: #1f3055;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.lista-header h2 { color: white; font-size: 16px; }
.lista-buscar {
  padding: 12px 14px;
  background: #202b3d;
}
.lista-buscar input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 2px solid #354466;
  background: #2a3650;
  color: white;
  font-size: 14px;
  outline: none;
}
.lista-buscar input::placeholder { color: #8899bb; }
.lista-buscar input:focus { border-color: #ff7300; }
.lista-items { padding: 0 14px; }
.lista-item {
  background: white;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border: 1px solid #e0e0e0;
}
.lista-item:hover { background: #f0f4ff; border-color: #c5d3ea; }
.lista-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #264984;
  border: 2px solid #ff7300;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; color: white;
  flex-shrink: 0; overflow: hidden;
}
.lista-avatar img { width: 100%; height: 100%; object-fit: cover; }
.lista-info { flex: 1; min-width: 0; }
.lista-nombre { font-size: 13px; font-weight: bold; color: #1f3055;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lista-cargo  { font-size: 11px; color: #888; margin-top: 2px; }

#pantalla-perfil { display: none; max-width: 420px; margin: 0 auto; padding-bottom: 0; }

.header-band {
  background: #1f3055;
  padding: 20px 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff7300;
  background: #264984;
  flex-shrink: 0;
}
.avatar-fallback {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: #264984;
  border: 3px solid #ff7300;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: bold; color: white;
  flex-shrink: 0;
}
.header-info { flex: 1; }
.header-info h1  { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 3px; }
.header-slogan   { font-size: 13px; color: #ff7300; margin-bottom: 2px; }
.header-dni      { font-size: 11px; color: #ffffff; margin-top: 3px; }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px;
  background: #202b3d;
}
.info-box {
  background: white;
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid #c5d3ea;
}
.info-box label { font-size: 11px; color: #888; display: block; margin-bottom: 2px; }
.info-box span  { font-size: 13px; font-weight: bold; color: #1f3055; }
.btn-mapa {
  background: #1f3055; color: white;
  border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 12px;
  font-weight: bold; cursor: pointer;
  width: 100%; text-align: left;
  margin-top: 2px;
}
.btn-mapa:hover { background: #264984; }
.dropdown-mapa { display: none; flex-direction: column; gap: 4px; margin-top: 4px; }
.dropdown-mapa.abierto { display: flex; }

.seccion { padding: 0 14px 6px; }
.seccion-titulo {
  font-size: 11px; font-weight: bold; color: #ff7300;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 14px 0 8px;
  border-bottom: 1px solid #ffe0c0;
  margin-bottom: 10px;
}

.riesgos-wrap { display: flex; flex-direction: column; gap: 6px; }
.riesgo-tag {
  background: #fff8f0;
  color: #cc5e00;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1.5px solid #ff7300;
  font-weight: bold;
}

.tabs {
  display: flex;
  background: white;
  border-bottom: 2px solid #c5d3ea;
  margin: 14px 0 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 11px 4px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-weight: bold;
}
.tab.activa { color: #1f3055; border-bottom-color: #ff7300; }
.tab-content { display: none; padding: 4px 14px 8px; background: #202b3d; }
.tab-content.activa { display: block; }

.doc-item {
  background: white;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.doc-info    { flex: 1; min-width: 0; }
.doc-tipo    { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; }
.doc-nombre  { font-size: 13px; font-weight: bold; color: #1f3055; margin-bottom: 3px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-fecha   { font-size: 11px; color: #888; }
.doc-derecha { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

.badge { font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.badge-VIGENTE    { background: #E2EFDA; color: #375623; border: 1px solid #A9D18E; }
.badge-POR-VENCER { background: #FFF2CC; color: #7F5B00; border: 1px solid #FFD966; }
.badge-VENCIDO    { background: #FCE4D6; color: #833C00; border: 1px solid #F4B183; }

.btn-pdf {
  font-size: 11px;
  color: #1f3055;
  background: #e8eef8;
  border: 1px solid #c5d3ea;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-weight: bold;
}
.btn-pdf:hover { background: #c5d3ea; }

#visor-pdf {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  flex-direction: column;
}
.visor-header {
  background: #1f3055;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.visor-header span { color: white; font-size: 14px; font-weight: bold; }
.btn-cerrar {
  background: rgba(255,255,255,0.2);
  color: white; border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: bold;
}
#iframe-pdf { flex: 1; border: none; width: 100%; }

.btn-salir {
  display: block; width: 100%; margin: 0; padding: 13px;
  background: #C00000; color: white; border: none;
  border-top: 1px solid #ddd;
  border-radius: 0; font-size: 13px; text-align: center;
  cursor: pointer; font-weight: bold;
}
.btn-salir:hover { background: #a00000; }
.sin-datos { text-align: center; color: #aaa; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<!-- PANTALLA CARGA -->
<div id="pantalla-carga">
  <div class="spinner"></div>
  <p class="carga-texto">Cargando datos...</p>
</div>

<!-- PANTALLA PIN -->
<div id="pantalla-pin">
  <div class="pin-card">
    <input class="pin-input" type="password" id="input-pin"
           maxlength="6" placeholder="••••" inputmode="numeric" pattern="[0-9]*"
           onkeydown="if(event.key==='Enter') verificarPin()">
    <button class="btn-entrar" onclick="verificarPin()">INGRESAR</button>
    <p class="pin-error" id="pin-error">PIN incorrecto. Intenta nuevamente.</p>
    <p class="pin-frase">Cada tarea, cada turno,<br>cada decisión importa.<br>Tú eres lo más valioso de<br>esta operación.</p>
  </div>
</div>

<!-- PANTALLA LISTA -->
<div id="pantalla-lista">
  <div class="lista-header">
    <h2>Selecciona un colaborador</h2>
    <button class="btn-cerrar" onclick="cerrarSesion()">✕ Salir</button>
  </div>
  <div class="lista-buscar">
    <input type="text" id="lista-search" placeholder="Buscar por nombre..." oninput="filtrarLista()">
  </div>
  <div class="lista-items" id="lista-items"></div>
</div>

<!-- PANTALLA PERFIL -->
<div id="pantalla-perfil">
  <div class="header-band">
    <div id="avatar-container"></div>
    <div class="header-info">
      <h1 id="op-nombre"></h1>
      <p class="header-slogan" id="op-cargo"></p>
      <p class="header-dni" id="op-dni"></p>
    </div>
  </div>
  <div class="info-grid">
    <div class="info-box"><label>Área</label><span id="op-area"></span></div>
    <div class="info-box"><label>Años en empresa</label><span id="op-antiguedad"></span></div>
    <div class="info-box"><label>Puesto</label><span id="op-puesto"></span></div>
    <div class="info-box" id="box-mapa"><label>Mapa de Riesgos</label><div id="op-mapa"></div></div>
  </div>
  <div class="seccion">
    <div class="seccion-titulo">Riesgos críticos del área</div>
    <div class="riesgos-wrap" id="op-riesgos"></div>
  </div>
  <div class="tabs">
    <div class="tab activa" onclick="cambiarTab(0)">Capacitaciones</div>
    <div class="tab"        onclick="cambiarTab(1)">Certificaciones</div>
    <div class="tab"        onclick="cambiarTab(2)">Exam. Médico</div>
  </div>
  <div class="tab-content activa" id="tab-capacitaciones"></div>
  <div class="tab-content"        id="tab-certificaciones"></div>
  <div class="tab-content"        id="tab-medico"></div>
  <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<!-- VISOR PDF -->
<div id="visor-pdf">
  <div class="visor-header">
    <span id="visor-titulo">Documento</span>
    <button class="btn-cerrar" onclick="cerrarPDF()">✕ Cerrar</button>
  </div>
  <iframe id="iframe-pdf" allowfullscreen></iframe>
</div>

<script>
const SHEETS_ID   = "1FoN-S-KOjs1vRuekQktGnX17_2pduM9ZjhDG3g8t5ZM";
const PIN_MAESTRO = "0000";
const PIN_SUPER   = "2002";
const PIN_ALEX    = "1008";
const DNI_ALEX    = "75073340";

let colaboradores = [];
let riesgos       = [];
let documentos    = [];
let medico        = [];

function sheetURL(hoja) {
  return `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(hoja)}`;
}

async function fetchCSV(hoja) {
  const res  = await fetch(sheetURL(hoja));
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines   = text.trim().split("\n");
  const headers = parseLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj  = {};
    headers.forEach((h, i) => obj[h.trim().replace(/"/g,"")] = (vals[i] || "").trim().replace(/"/g,""));
    return obj;
  });
}

function parseLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ""; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

async function cargarDatos() {
  try {
    [colaboradores, riesgos, documentos, medico] = await Promise.all([
      fetchCSV("1_Colaboradores"),
      fetchCSV("2_Riesgos"),
      fetchCSV("3_Documentos"),
      fetchCSV("4_Medico"),
    ]);
    document.getElementById("pantalla-carga").style.display = "none";
    document.getElementById("pantalla-pin").style.display   = "flex";
  } catch(e) {
    document.querySelector(".carga-texto").textContent = "Error al cargar. Verifica tu conexión.";
  }
}

const dniLimpio = (d) => String(parseInt(d || "0"));

function verificarPin() {
  const pin   = document.getElementById("input-pin").value.trim();
  const error = document.getElementById("pin-error");
  error.style.display = "none";

  /* PIN maestro — ve lista de todos */
  if (pin === PIN_MAESTRO) {
    mostrarLista(); return;
  }

  /* PIN Alexander — solo su perfil */
  if (pin === PIN_ALEX) {
    mostrarPerfil(DNI_ALEX); return;
  }

  /* PIN supervisión — ve lista de todos menos Alexander */
  if (pin === PIN_SUPER) {
    mostrarLista(true); return;
  }

  /* PIN colaborador — 4 primeros dígitos del DNI */
  const op = colaboradores.find(c => {
    const dni = dniLimpio(c.DNI);
    return dni.startsWith(pin) && pin.length === 4 && dni !== DNI_ALEX;
  });

  if (op) {
    mostrarPerfil(dniLimpio(op.DNI)); return;
  }

  mostrarError("PIN incorrecto. Intenta nuevamente.");
}

function mostrarError(msg) {
  const e = document.getElementById("pin-error");
  e.textContent   = msg;
  e.style.display = "block";
  document.getElementById("input-pin").value = "";
}

/* ══════════════════════════════════════════════
   LISTA DE COLABORADORES
══════════════════════════════════════════════ */
let listaFiltrada = [];

function mostrarLista(ocultarAlex = false) {
  listaFiltrada = ocultarAlex
    ? colaboradores.filter(c => dniLimpio(c.DNI) !== DNI_ALEX)
    : colaboradores;

  document.getElementById("pantalla-pin").style.display    = "none";
  document.getElementById("pantalla-lista").style.display  = "block";
  document.getElementById("lista-search").value = "";
  renderLista(listaFiltrada);
}

function filtrarLista() {
  const q = document.getElementById("lista-search").value.toLowerCase();
  const filtrados = listaFiltrada.filter(c => (c.Nombre || "").toLowerCase().includes(q));
  renderLista(filtrados);
}

function renderLista(lista) {
  const el = document.getElementById("lista-items");
  el.innerHTML = "";
  lista.forEach(c => {
    const dni      = dniLimpio(c.DNI);
    const partes   = (c.Nombre || "").split(" ");
    const iniciales = (partes[1]?.[0] || "") + (partes[0]?.[0] || "");
    const fotoURL  = c.Foto || "";

    const item = document.createElement("div");
    item.className = "lista-item";
    item.onclick   = () => {
      document.getElementById("pantalla-lista").style.display = "none";
      mostrarPerfil(dni);
    };

    let avatarHTML = `<div class="lista-avatar">${iniciales.toUpperCase()}</div>`;
    if (fotoURL.includes("drive.google.com")) {
      const match = fotoURL.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) {
        avatarHTML = `<div class="lista-avatar"><img src="https://drive.google.com/thumbnail?id=${match[1]}&sz=w100" onerror="this.parentElement.innerHTML='${iniciales.toUpperCase()}'"></div>`;
      }
    }

    item.innerHTML = `
      ${avatarHTML}
      <div class="lista-info">
        <div class="lista-nombre">${c.Nombre || ""}</div>
        <div class="lista-cargo">${c.Cargo || ""}</div>
      </div>
    `;
    el.appendChild(item);
  });
}

/* ══════════════════════════════════════════════
   MOSTRAR PERFIL
══════════════════════════════════════════════ */
function mostrarPerfil(dni) {
  const op = colaboradores.find(c => dniLimpio(c.DNI) === dniLimpio(dni));
  if (!op) { mostrarError("Operador no encontrado."); return; }

  const avatarContainer = document.getElementById("avatar-container");
  avatarContainer.innerHTML = "";
  const partes    = (op.Nombre || "").split(" ");
  const iniciales = (partes[1]?.[0] || "") + (partes[0]?.[0] || "");
  const fotoURL   = op.Foto || "";

  if (fotoURL.includes("drive.google.com")) {
    const match = fotoURL.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match) {
      const img     = document.createElement("img");
      img.className = "avatar";
      img.src       = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
      img.onerror   = () => { avatarContainer.innerHTML = `<div class="avatar-fallback">${iniciales.toUpperCase()}</div>`; };
      avatarContainer.appendChild(img);
    }
  } else {
    avatarContainer.innerHTML = `<div class="avatar-fallback">${iniciales.toUpperCase()}</div>`;
  }

  document.getElementById("op-nombre").textContent     = op.Nombre || "";
  document.getElementById("op-dni").textContent        = "DNI: " + dniLimpio(op.DNI);
  document.getElementById("op-puesto").textContent     = op.Area1 || "";
  document.getElementById("op-antiguedad").textContent = tiempoDesde(op.FechaIngreso || "");
  document.getElementById("op-cargo").textContent      = op.Cargo || "";
  document.getElementById("op-area").textContent       = "Planta Óxidos";

  const areas = [op.Area1, op.Area2, op.Area3].filter(a => a && a.trim());

  /* Mapa de Riesgos */
  const mapaLinks = [];
  areas.forEach(area => {
    const fila = riesgos.find(r => r.Area === area && r["Mapa de Riesgos"]);
    if (fila) mapaLinks.push({ area, url: fila["Mapa de Riesgos"] });
  });

  const mapaEl = document.getElementById("op-mapa");
  mapaEl.innerHTML = "";

  if (mapaLinks.length === 1) {
    const btn = document.createElement("button");
    btn.className   = "btn-mapa";
    btn.textContent = "Ver Mapa";
    btn.onclick     = () => abrirPDF(drivePreview(mapaLinks[0].url), "Mapa de Riesgos");
    mapaEl.appendChild(btn);
  } else if (mapaLinks.length > 1) {
    const btnPrincipal = document.createElement("button");
    btnPrincipal.className   = "btn-mapa";
    btnPrincipal.textContent = "Ver Mapa ▼";
    const dropdown = document.createElement("div");
    dropdown.className = "dropdown-mapa";
    mapaLinks.forEach(m => {
      const btn2 = document.createElement("button");
      btn2.className   = "btn-mapa";
      btn2.textContent = m.area;
      btn2.onclick     = () => abrirPDF(drivePreview(m.url), "Mapa de Riesgos - " + m.area);
      dropdown.appendChild(btn2);
    });
    btnPrincipal.onclick = () => dropdown.classList.toggle("abierto");
    mapaEl.appendChild(btnPrincipal);
    mapaEl.appendChild(dropdown);
  } else {
    mapaEl.innerHTML = '<span style="color:#aaa;font-size:11px;">Sin mapa asignado</span>';
  }

  /* Riesgos */
  const riesgosSet = new Set();
  areas.forEach(area => {
    riesgos.filter(r => r.Area === area).forEach(r => riesgosSet.add(r.Riesgo));
  });
  const riesgosEl = document.getElementById("op-riesgos");
  riesgosEl.innerHTML = "";
  if (riesgosSet.size === 0) {
    riesgosEl.innerHTML = '<span style="color:#aaa;font-size:12px;">Sin riesgos asignados</span>';
  } else {
    riesgosSet.forEach(r => {
      const tag       = document.createElement("span");
      tag.className   = "riesgo-tag";
      tag.textContent = r;
      riesgosEl.appendChild(tag);
    });
  }

  /* Documentos */
  const dniStr   = dniLimpio(op.DNI);
  const docsOp   = documentos.filter(d => dniLimpio(d.DNI) === dniStr && d.Tipo && d.Nombre);
  const medicoOp = medico.filter(d => dniLimpio(d.DNI) === dniStr && d.Nombre);

  renderDocs("tab-capacitaciones",  docsOp.filter(d => d.Tipo === "Capacitación"));
  renderDocs("tab-certificaciones", docsOp.filter(d => d.Tipo === "Certificación"));
  renderMedico("tab-medico", medicoOp);

  /* Resetear tabs */
  cambiarTab(0);

  document.getElementById("pantalla-pin").style.display    = "none";
  document.getElementById("pantalla-perfil").style.display = "block";
}

function renderDocs(contenedorId, docs) {
  const el = document.getElementById(contenedorId);
  el.innerHTML = "";
  if (!docs || docs.length === 0) {
    el.innerHTML = '<p class="sin-datos">Sin documentos registrados</p>';
    return;
  }
  docs.forEach(doc => {
    const estado     = doc.Estado || "";
    const badgeClass = "badge-" + estado.replace(/ /g, "-");
    const pdfURL     = doc.PDF ? drivePreview(doc.PDF) : "";
    const div        = document.createElement("div");
    div.className    = "doc-item";
    div.innerHTML    = `
      <div class="doc-info">
        <div class="doc-tipo">${doc.Tipo || ""}</div>
        <div class="doc-nombre">${doc.Nombre || ""}</div>
        <div class="doc-fecha">Vence: ${doc.FechaVencimiento || "—"}</div>
      </div>
      <div class="doc-derecha">
        ${estado ? `<span class="badge ${badgeClass}">${estado}</span>` : ""}
        ${pdfURL ? `<button class="btn-pdf" onclick="abrirPDF('${pdfURL}','${doc.Nombre}')">Ver PDF</button>` : ""}
      </div>
    `;
    el.appendChild(div);
  });
}

function renderMedico(contenedorId, docs) {
  const el = document.getElementById(contenedorId);
  el.innerHTML = "";
  if (!docs || docs.length === 0) {
    el.innerHTML = '<p class="sin-datos">Sin exámenes registrados</p>';
    return;
  }
  docs.forEach(doc => {
    const estado     = doc.Estado || "";
    const badgeClass = "badge-" + estado.replace(/ /g, "-");
    const pdfURL     = doc.PDF ? drivePreview(doc.PDF) : "";
    const div        = document.createElement("div");
    div.className    = "doc-item";
    div.innerHTML    = `
      <div class="doc-info">
        <div class="doc-tipo">Examen Médico</div>
        <div class="doc-nombre">${doc.Nombre || ""}</div>
        <div class="doc-fecha">Vence: ${doc.FechaVencimiento || "—"}</div>
      </div>
      <div class="doc-derecha">
        ${estado ? `<span class="badge ${badgeClass}">${estado}</span>` : ""}
        ${pdfURL ? `<button class="btn-pdf" onclick="abrirPDF('${pdfURL}','${doc.Nombre}')">Ver PDF</button>` : ""}
      </div>
    `;
    el.appendChild(div);
  });
}

function drivePreview(url) {
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/file/d/${match[1]}/preview?rm=minimal&embedded=true`;
  return url;
}

function tiempoDesde(f) {
  if (!f) return "—";
  const parts = f.split("/");
  if (parts.length !== 3) return "—";
  const [d, m, y] = parts.map(Number);
  const desde = new Date(y, m - 1, d);
  const hoy   = new Date();
  let a  = hoy.getFullYear() - desde.getFullYear();
  let ms = hoy.getMonth()    - desde.getMonth();
  if (ms < 0) { a--; ms += 12; }
  if (a > 0 && ms > 0) return `${a} año${a > 1 ? "s" : ""} ${ms} mes${ms > 1 ? "es" : ""}`;
  if (a > 0) return `${a} año${a > 1 ? "s" : ""}`;
  return `${ms} mes${ms > 1 ? "es" : ""}`;
}

function cambiarTab(idx) {
  document.querySelectorAll(".tab").forEach((t, i)         => t.classList.toggle("activa", i === idx));
  document.querySelectorAll(".tab-content").forEach((c, i) => c.classList.toggle("activa", i === idx));
}

function abrirPDF(url, titulo) {
  document.getElementById("visor-titulo").textContent = titulo;
  document.getElementById("iframe-pdf").src           = url;
  document.getElementById("visor-pdf").style.display  = "flex";
}

function cerrarPDF() {
  document.getElementById("visor-pdf").style.display = "none";
  document.getElementById("iframe-pdf").src          = "";
}

function cerrarSesion() { location.reload(); }

cargarDatos();
</script>
